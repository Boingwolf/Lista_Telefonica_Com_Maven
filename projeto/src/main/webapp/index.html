<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="author" name="Guilherme Eusébio">
    <title>Lista Telefónica</title>
    <link rel="stylesheet" href="./CSS/root.css">
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <header>
        <h1>Lista Telefónica</h1>
    </header>
    <main>
        <div class="campo">
            <input type="text" id="adicionarNome" name="adicionarNome" placeholder="Nome...">
            <input type="number" id="adicionarNumero" name="adicionarNumero" placeholder="Número...">
            <input type="email" id="adicionarEmail" name="adicionarEmail" placeholder="Email...">
            <input type="text" id="adicionarNota" name="adicionarNota" placeholder="Nota...">
            <button type="submit" id="adicionarContacto">Adicionar Contacto</button>
        </div>
        <section class="lista-wrapper">
            <h2>Contactos</h2>
            <ul id="listaContactos" class="lista-contactos"></ul>
        </section>
    </main>
    <footer>
        <p>Desenvolvido por Guilherme Eusébio</p>
    </footer>
    <script src="JS/script.js"></script>
</body>
</html>
