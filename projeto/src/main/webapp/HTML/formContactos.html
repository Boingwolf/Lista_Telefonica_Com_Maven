<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="author" name="Guilherme Eusébio">
    <link rel="stylesheet" href="../CSS/root.css">
    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/layout.css">
    <link rel="stylesheet" href="../CSS/components.css">
    <link rel="stylesheet" href="../CSS/forms.css">
    <title>Formulário de Contactos</title>
</head>
<body>
    <header class="site-header">
        <div class="site-bar">
            <h1 class="site-brand">Adicionar Contacto</h1>
        </div>
    </header>
    <main>
        <div class="campo">
            <div class="form-grupo">
                <input type="text" id="adicionarNome" name="adicionarNome" placeholder="Nome...">
                <p class="mensagem-erro" id="erroNome"></p>
            </div>
            <div class="form-grupo">
                <input type="tel" id="adicionarNumero" name="adicionarNumero" placeholder="Número...">
                <p class="mensagem-erro" id="erroNumero"></p>
            </div>
            <div class="form-grupo">
                <input type="email" id="adicionarEmail" name="adicionarEmail" placeholder="Email...">
                <p class="mensagem-erro" id="erroEmail"></p>
            </div>
            <div class="form-grupo">
                <textarea id="adicionarNota" name="adicionarNota" placeholder="Nota..."></textarea>
                <p class="mensagem-erro" id="erroNota"></p>
            </div>
            <a href="../index.html" id="cancelarContacto" class="botao-link">Cancelar</a>
            <button type="submit" id="adicionarContacto">Adicionar Contacto</button>
        </div>
    </main>
    <footer class="site-footer">
        <div class="site-bar">
            <p class="site-meta">Desenvolvido por Guilherme Eusébio</p>
            <p class="site-meta">&copy; 2026</p>
        </div>
    </footer>
    <script src="../JS/contactos-service.js"></script>
    <script src="../JS/formContactos.js"></script>
</body>
</html>
